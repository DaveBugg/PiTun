# SPA fallback config for the frontend container.
#
# Mounted at /etc/nginx/conf.d/default.conf inside the `frontend`
# service (plain nginx:1.25-alpine, no custom image required). The
# static dist tarball from each release lands in
# `<install-dir>/frontend/dist/` and gets served from here. The reverse-
# proxy `nginx` service in front of this one is what publishes :80 to
# the LAN — this container is internal-only.
#
# Why a separate file vs the printf-in-Dockerfile pattern that lived
# in `frontend/Dockerfile` historically: shipping it as a real config
# file makes the offline / `docker load` install path work without
# building a custom image (the image was just nginx + COPY dist + the
# inline config; with the dist bind-mounted and the config bind-mounted
# there's nothing left to bake into a custom image).
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: any URL that doesn't map to a static file falls
    # through to index.html so the React Router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache static assets — Vite hashes their filenames, so
    # `index-<hash>.js` invalidates automatically on a new build.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
