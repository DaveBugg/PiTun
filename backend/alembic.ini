[alembic]
script_location = alembic
# Fallback only. The real URL is read from the `DATABASE_URL` environment
# variable in env.py — see the container compose file. This value is only
# used when DATABASE_URL is unset (e.g. running `alembic revision --autogenerate`
# locally without activating the virtual env).
sqlalchemy.url = sqlite:///./data/pitun.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
