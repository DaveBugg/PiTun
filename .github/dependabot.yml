# Dependabot configuration.
#
# Watches every dependency surface in the repo and opens a PR whenever
# something has a new version. Three reasons we want this on:
#
# 1. Security: GitHub Actions and base Docker images are pinned to
#    SHAs / digests. Without dependabot, those pins would gradually
#    fall behind upstream patches and we'd ship vulnerable transitive
#    deps. With it, PRs land automatically and we just review+merge.
#
# 2. Visibility: PRs are the audit trail — every bump is reviewable in
#    isolation, with the upstream changelog linked in the PR body.
#
# 3. Triggers CI: each PR runs ci.yml, so we know immediately whether
#    a bump breaks the build.
#
# We use weekly cadence (vs daily) to avoid burying the issue feed when
# 5+ ecosystems each open a PR. `open-pull-requests-limit: 5` keeps any
# single ecosystem from monopolising the queue.

version: 2
updates:
  # GitHub Actions used by the workflows in .github/workflows/.
  # Every action is pinned to a SHA with a `# vX.Y.Z` trailing comment;
  # dependabot updates both the SHA and the comment in one PR.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: scope

  # Backend Python dependencies (FastAPI, SQLModel, Pydantic, etc.).
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "backend"
      include: scope
    ignore:
      # Pin floor versions for libs whose pre-1.0 minor/patch bumps
      # are de-facto breaking. Dependabot's `update-types: semver-major`
      # filter only matches the leftmost version segment; for fastapi
      # at 0.111.x, a bump to 0.136.x is a *minor* in semver terms but
      # breaks the lifespan / dependency-injection contract we rely on.
      # We use `versions:` ranges so the actual upgrade happens
      # deliberately as a planned migration epic.
      - dependency-name: "fastapi"
        versions: [">=0.112.0"]
      - dependency-name: "sqlmodel"
        versions: [">=0.0.20"]

  # Frontend npm dependencies (React 19, Vite, TanStack Query, …).
  # NOTE: we don't track package-lock.json, so dependabot updates only
  # `package.json`. CI regenerates the lock on each run.
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "frontend"
      include: scope
    ignore:
      # Tailwind 3 → 4 is a full Oxide-engine rewrite (config moved to
      # @theme/@layer in CSS, plugin API changed). We'll do that as
      # its own planned migration rather than have Dependabot keep
      # opening — and us keep closing — a doomed major-bump PR.
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      # ESLint 9+ requires flat-config (eslint.config.js, no .eslintrc).
      # We don't actually run ESLint in CI yet (no config file tracked),
      # so blocking the major also blocks the typescript-eslint companion
      # bumps that fail in lockstep. Revisit if/when we add a config.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@typescript-eslint/eslint-plugin"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@typescript-eslint/parser"
        update-types: ["version-update:semver-major"]
      # Vite 6+ drops Node 18 support and changes the plugin/HMR APIs.
      # Vitest pins its supported Vite range — they'll need to be
      # upgraded together. Plan as one epic; meanwhile stay on 5.x.
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]

  # Backend Docker base image (python:3.11-slim) — bumps the digest
  # pinned in backend/Dockerfile.
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    commit-message:
      prefix: "backend"
      include: scope

  # Naive sidecar Docker base (debian:bookworm-slim).
  - package-ecosystem: docker
    directory: /docker/naive
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    commit-message:
      prefix: "naive"
      include: scope

  # Frontend dev Dockerfile (used by docker-compose.dev.yml). Pins
  # `node:20` and `nginx:1.25-alpine`.
  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    commit-message:
      prefix: "frontend"
      include: scope
